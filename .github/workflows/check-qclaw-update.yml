name: Check QClaw Update

on:
  schedule:
    - cron: "0 */12 * * *" # Every 12 hours
  workflow_dispatch: # Manual trigger

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  check-update:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download QClaw installer
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://cdn.m.qq.com/qclaw/win/5001/QClaw-Setup-latest.exe" -OutFile "QClaw-Setup-latest.exe"
          $hash = (Get-FileHash "QClaw-Setup-latest.exe" -Algorithm SHA256).Hash
          echo "CURRENT_HASH=$hash" >> $env:GITHUB_ENV
          echo "Current installer hash: $hash"

      - name: Check if version changed
        id: check
        shell: pwsh
        run: |
          $knownHash = ""
          $hashFile = ".github/qclaw-known-hash.txt"
          if (Test-Path $hashFile) {
            $raw = Get-Content $hashFile -Raw
            if ($raw) { $knownHash = $raw.Trim() }
          }
          if ($knownHash -eq $env:CURRENT_HASH -and $knownHash -ne "") {
            echo "changed=false" >> $env:GITHUB_OUTPUT
            echo "No change detected, skipping."
          } else {
            echo "changed=true" >> $env:GITHUB_OUTPUT
            echo "Change detected! Old: $knownHash / New: $($env:CURRENT_HASH)"
          }

      - name: Silent install QClaw
        if: steps.check.outputs.changed == 'true'
        shell: pwsh
        run: |
          echo "Installing QClaw silently..."
          Start-Process -FilePath ".\QClaw-Setup-latest.exe" -ArgumentList "/S" -Wait
          # Wait extra time for installer to finish writing files
          Start-Sleep -Seconds 15

          # Find install path
          $candidates = @(
            "$env:LOCALAPPDATA\Programs\QClaw",
            "C:\Program Files\QClaw",
            "C:\Program Files (x86)\QClaw"
          )
          $installPath = ""
          foreach ($p in $candidates) {
            if (Test-Path "$p\resources\app.asar") {
              $installPath = $p
              break
            }
          }
          if ($installPath -eq "") {
            echo "::error::QClaw install path not found after silent install"
            exit 1
          }
          echo "QCLAW_PATH=$installPath" >> $env:GITHUB_ENV
          echo "QClaw installed at: $installPath"

      - name: Extract QClaw version
        if: steps.check.outputs.changed == 'true'
        id: version
        shell: pwsh
        run: |
          $exePath = "$env:QCLAW_PATH\QClaw.exe"
          if (Test-Path $exePath) {
            $ver = (Get-Item $exePath).VersionInfo.ProductVersion
            if (-not $ver) {
              $ver = (Get-Item $exePath).VersionInfo.FileVersion
            }
            echo "QCLAW_VERSION=$ver" >> $env:GITHUB_ENV
            echo "QClaw version: $ver"
          } else {
            echo "QCLAW_VERSION=unknown" >> $env:GITHUB_ENV
            echo "::warning::Could not find QClaw.exe to extract version"
          }

      - name: Setup Node.js
        if: steps.check.outputs.changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        if: steps.check.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v2

      - name: Build patch
        if: steps.check.outputs.changed == 'true'
        shell: pwsh
        run: |
          bun install
          bun run build

      - name: Try patch
        if: steps.check.outputs.changed == 'true'
        id: patch
        shell: pwsh
        run: |
          echo "Attempting to patch QClaw at: $env:QCLAW_PATH"

          # Kill QClaw if running
          Get-Process -Name "QClaw" -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

          # Run the built patch.js
          node dist/patch.js
        continue-on-error: true

      - name: Update README and create PR
        if: steps.check.outputs.changed == 'true' && steps.patch.outcome == 'success'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:QCLAW_VERSION
          $hash = $env:CURRENT_HASH
          $branch = "chore/qclaw-update-$version"

          # Update hash file
          Set-Content -Path ".github/qclaw-known-hash.txt" -Value $hash -NoNewline

          # Update README - replace version line
          $readme = Get-Content "README.md" -Raw
          $oldPattern = "QClaw v[\d.]+\+"
          if ($version -ne "unknown" -and $readme -match $oldPattern) {
            $readme = $readme -replace $oldPattern, "QClaw v${version}+"
            Set-Content -Path "README.md" -Value $readme -NoNewline
            echo "README updated with version $version"
          }

          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create branch and commit
          git checkout -b $branch
          git add ".github/qclaw-known-hash.txt" "README.md"
          git diff --cached --quiet
          if ($LASTEXITCODE -eq 0) {
            echo "No file changes to commit, skipping PR."
            exit 0
          }

          git commit -m "chore: update QClaw tested version to $version"
          git push origin $branch

          # Create PR
          $body = "## Summary`n"
          $body += "- QClaw released a new version: **$version**`n"
          $body += "- Patch has been **tested successfully** against this version`n"
          $body += "- Updated supported version in README`n"
          $body += "- Installer SHA256: ``$hash```n`n"
          $body += "## Auto-generated`n"
          $body += "This PR was created automatically by the QClaw update checker workflow."
          gh pr create --title "chore: update QClaw tested version to $version" --body $body

      - name: Create issue on patch failure
        if: steps.check.outputs.changed == 'true' && steps.patch.outcome == 'failure'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = $env:QCLAW_VERSION
          $hash = $env:CURRENT_HASH

          # Check if a similar issue already exists
          $existing = gh issue list --search "QClaw $version patch" --state open --json number | ConvertFrom-Json
          if ($existing.Count -gt 0) {
            echo "Issue already exists for this version, skipping."
            exit 0
          }

          $body = "## QClaw Update Detected`n`n"
          $body += "A new version of QClaw has been detected, but the patch **failed** to apply.`n`n"
          $body += "- **Version**: $version`n"
          $body += "- **Installer SHA256**: ``$hash```n"
          $body += "- **Download**: https://cdn.m.qq.com/qclaw/win/5001/QClaw-Setup-latest.exe`n`n"
          $body += "## Action Required`n"
          $body += "The patch logic in ``patch.ts`` likely needs to be updated for compatibility with this new version.`n`n"
          $body += "Please check the workflow run for detailed error logs.`n`n"
          $body += "## Auto-generated`n"
          $body += "This PR was created automatically by the QClaw update checker workflow."
          gh issue create --title "QClaw $version: patch incompatible" --body $body

          # Also update hash file so we don't keep creating issues
          Set-Content -Path ".github/qclaw-known-hash.txt" -Value $hash -NoNewline
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ".github/qclaw-known-hash.txt"
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "chore: update QClaw known hash (patch failed for $version)"
            git push origin main
          }
